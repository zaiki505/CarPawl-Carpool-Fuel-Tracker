# Netlify build config for the CarPawl Vite PWA.
#
# carpawl.netlify.app is the OFFICIAL web app, so it builds the release channel.
# A bare `npm run build` defaults to beta (see src/lib/channel.js), which would
# title the tab "CarPawl Beta" and point the update check at the beta repo.
[build]
  command = "npm run build:release"
  publish = "dist"

# SPA fallback: every route serves index.html so client-side navigation and
# deep links resolve to the app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never cache the service worker or manifest - they must update immediately so
# new deploys reach installed clients.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"
