<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Purple" subtitle="#a754ff — the single brand accent + gradient partners" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-page);padding:20px;font-family:var(--font-mono);}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .sw{flex:1;min-width:100px;height:96px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff;font-size:.7rem;font-weight:700;box-shadow:var(--shadow-card);}
  .sw small{display:block;opacity:.85;font-weight:500;}
</style></head>
<body class="z-body"><div class="row">
  <div class="sw" style="background:#a754ff;box-shadow:var(--shadow-accent)">--highlight<small>#a754ff</small></div>
  <div class="sw" style="background:#c893fa">hover<small>#c893fa</small></div>
  <div class="sw" style="background:#d48cff;color:#1c1c1c">--accent-soft<small>#d48cff</small></div>
  <div class="sw" style="background:#c2a0f5;color:#1c1c1c">--accent-pale<small>#c2a0f5</small></div>
  <div class="sw" style="background:#7b5bff">--accent-deep<small>#7b5bff</small></div>
</div></body></html>
