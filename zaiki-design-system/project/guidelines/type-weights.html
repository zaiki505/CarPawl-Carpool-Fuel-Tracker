<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-page);padding:22px 26px;font-family:var(--font-mono);color:var(--text-primary);}
  .row{display:flex;gap:26px;flex-wrap:wrap;}
  .w span{font-size:1.4rem;display:block;}

</style></head>
<body class="z-body"><div class="row">
  <div class="w"><span style="font-weight:300">Aa</span><small>Light 300</small></div>

  <div class="w"><span style="font-weight:500">Aa</span><small>Medium 500</small></div>
  <div class="w"><span style="font-weight:700">Aa</span><small>Bold 700</small></div>
  <div class="w"><span style="font-weight:800">Aa</span><small>Extra 800</small></div>
  <div class="w"><span style="font-style:italic">Aa</span><small>Italic</small></div>
</div>
<p style="margin-top:16px;font-size:.8rem;color:var(--text-body);line-height:1.7">
<span style="color:var(--highlight);font-weight:700;text-transform:uppercase">UPPERCASE KICKER</span> · Title Case Headings · sentence case body · <span class="tag tag-system">UPPERCASE TAG</span></p>
</body></html>
