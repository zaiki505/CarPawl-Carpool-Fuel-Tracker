<!-- @dsCard group="Type" viewport="700x210" name="JetBrains Mono — Scale" subtitle="One typeface everywhere: display → body" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-page);padding:22px 26px;font-family:var(--font-mono);color:var(--text-primary);}
  .kick{color:var(--highlight);font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
  .hero{font-size:2.6rem;font-weight:700;line-height:1.05;letter-spacing:-.02em;margin:0;}
  .h2{font-size:1.5rem;font-weight:700;margin:.5rem 0 0;}
  .body{font-size:.95rem;color:var(--text-body);line-height:1.6;margin:.5rem 0 0;max-width:52ch;}
  .grad{background:linear-gradient(110deg,#a754ff,#c2a0f5,#a754ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
</style></head>
<body class="z-body">
  <p class="kick">Hi there — I'm</p>
  <h1 class="hero">Muhd <span class="grad">Uzair</span></h1>
  <h2 class="h2">Web &amp; App Developer · Designer · Creator</h2>
  <p class="body">Computing student with a thing for clean, functional interfaces and the code behind them. JetBrains Mono, weights 100–800.</p>
</body></html>
