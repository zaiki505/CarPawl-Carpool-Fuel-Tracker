<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-page);padding:20px;font-family:var(--font-mono);}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .sw{flex:1;min-width:96px;height:96px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#0d0d10;font-size:.66rem;font-weight:700;}
  .sw small{display:block;opacity:.8;font-weight:600;}
</style></head>
<body class="z-body"><div class="row">
  <div class="sw" style="background:#00e676">available<small>#00e676</small></div>
  <div class="sw" style="background:#ff1744;color:#fff">unavailable<small>#ff1744</small></div>
  <div class="sw" style="background:#10b981">advanced<small>#10b981</small></div>
  <div class="sw" style="background:#eab308">intermediate<small>#eab308</small></div>
  <div class="sw" style="background:#f97316">beginner<small>#f97316</small></div>
</div></body></html>
