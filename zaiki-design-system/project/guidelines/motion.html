<!-- @dsCard group="Brand" viewport="700x200" name="Motion — Squish & Bounce" subtitle="Click any pill: the signature uiPop squish + bounce easings" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-page);padding:24px;font-family:var(--font-mono);color:var(--text-primary);}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .note{color:var(--text-faint);font-size:.7rem;margin-top:14px;line-height:1.6;}
  .ez{display:inline-block;background:var(--accent-wash-12);border:1px solid var(--accent-border-25);border-radius:999px;padding:.25rem .6rem;font-size:.66rem;color:var(--highlight);margin:2px;}
</style></head>
<body class="z-body">
  <div class="row">
    <a class="cta-primary" href="#" onclick="return sq(this)">Click me</a>
    <a class="cta-secondary" href="#" onclick="return sq(this)">And me</a>
    <span class="skill-chip" onclick="sq(this)">chip</span>
    <span class="tag tag-system" onclick="sq(this)">tag</span>
  </div>
  <div style="margin-top:14px">
    <span class="ez">--ease-bounce · .34,1.56,.64,1</span>
    <span class="ez">--ease-out-expo · .16,1,.3,1</span>
    <span class="ez">--ease-squish · uiPop</span>
  </div>
  <p class="note">Every interactive element squishes on click (uiPop). Entrances fade + slide + un-blur; the active nav pill glides with a squish-stretch. Bouncy overshoot is the brand's fingerprint.</p>
  <script>
    function sq(el){el.classList.remove('ui-clicked');void el.offsetWidth;el.classList.add('ui-clicked');el.addEventListener('animationend',()=>el.classList.remove('ui-clicked'),{once:true});return false;}
  </script>
</body></html>
